<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Google Clone - Powered by Tavily AI Search</title>
  <!-- Google Fonts & Font Awesome -->
  <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Google Sans', 'Roboto', Arial, sans-serif;
      background: #ffffff;
      color: #202124;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      transition: all 0.2s ease;
    }

    /* Dark mode */
    body.dark-mode {
      background: #202124;
      color: #e8eaed;
    }

    body.dark-mode .search-box {
      background: #303134;
      border-color: #5f6368;
    }

    body.dark-mode .search-box:hover,
    body.dark-mode .search-box:focus-within {
      background: #303134;
      border-color: #5f6368;
      box-shadow: 0 1px 6px rgba(0,0,0,0.5);
    }

    body.dark-mode .btn {
      background: #303134;
      border-color: #5f6368;
      color: #e8eaed;
    }

    body.dark-mode .btn:hover {
      background: #3c4043;
    }

    body.dark-mode .footer {
      background: #171717;
      border-top-color: #3c4043;
    }

    body.dark-mode .result-title a {
      color: #8ab4f8;
    }

    body.dark-mode .result-snippet,
    body.dark-mode .result-url span {
      color: #bdc1c6;
    }

    body.dark-mode .suggestions-dropdown {
      background: #303134;
      box-shadow: 0 4px 16px rgba(0,0,0,0.5);
    }

    body.dark-mode .suggestion-item:hover {
      background: rgba(255,255,255,0.05);
    }

    /* Header */
    .header {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      padding: 16px 30px;
      gap: 20px;
      flex-wrap: wrap;
    }

    .header-left {
      margin-right: auto;
      display: flex;
      gap: 20px;
    }

    .header-link {
      font-size: 14px;
      color: inherit;
      text-decoration: none;
      font-weight: 500;
      transition: color 0.2s;
    }

    .header-link:hover {
      text-decoration: underline;
    }

    .icon-btn {
      background: transparent;
      border: none;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background 0.2s;
      color: #5f6368;
      font-size: 20px;
    }

    .icon-btn:hover {
      background-color: rgba(60, 64, 67, 0.08);
    }

    .avatar {
      background: #1a73e8;
      color: white;
      border-radius: 50%;
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 500;
      font-size: 14px;
      cursor: pointer;
    }

    /* Main */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
    }

    .main.compact {
      justify-content: flex-start;
      margin-top: 20px;
    }

    .logo {
      margin-bottom: 28px;
      text-align: center;
      transition: all 0.3s ease;
      cursor: pointer;
    }

    .main.compact .logo {
      transform: scale(0.8);
      margin-bottom: 16px;
    }

    .logo svg {
      width: 272px;
      height: 92px;
    }

    .main.compact .logo svg {
      width: 180px;
      height: auto;
    }

    /* Search container */
    .search-container {
      width: 100%;
      max-width: 584px;
      transition: all 0.3s ease;
    }

    .search-box {
      width: 100%;
      border: 1px solid #dfe1e5;
      border-radius: 48px;
      display: flex;
      align-items: center;
      padding: 8px 16px;
      background: white;
      transition: box-shadow 0.2s, border-color 0.2s;
      box-shadow: 0 1px 6px rgba(32, 33, 36, 0.08);
      position: relative;
    }

    .search-box:focus-within {
      box-shadow: 0 1px 6px rgba(32, 33, 36, 0.28);
      border-color: transparent;
    }

    .search-icon {
      color: #9aa0a6;
      font-size: 20px;
      margin-right: 12px;
    }

    input {
      flex: 1;
      border: none;
      outline: none;
      font-size: 16px;
      padding: 12px 0;
      font-family: 'Roboto', Arial, sans-serif;
      background: transparent;
      color: inherit;
    }

    .search-actions {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .action-icon {
      color: #5f6368;
      font-size: 20px;
      cursor: pointer;
      padding: 6px;
      border-radius: 50%;
      transition: background 0.2s;
    }

    .action-icon:hover {
      background: rgba(0, 0, 0, 0.05);
    }

    /* Suggestions dropdown */
    .suggestions-dropdown {
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      background: white;
      border-radius: 24px;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.15);
      margin-top: 8px;
      z-index: 100;
      display: none;
      overflow: hidden;
    }

    .suggestion-item {
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 14px;
      cursor: pointer;
      transition: background 0.15s;
      font-size: 14px;
    }

    .suggestion-item:hover {
      background: rgba(0, 0, 0, 0.05);
    }

    .suggestion-item i {
      color: #9aa0a6;
      width: 18px;
    }

    /* Buttons */
    .buttons {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin-top: 32px;
      flex-wrap: wrap;
    }

    .btn {
      background: #f8f9fa;
      border: 1px solid #f8f9fa;
      border-radius: 4px;
      color: #3c4043;
      font-size: 14px;
      padding: 10px 20px;
      cursor: pointer;
      font-family: 'Google Sans', Roboto, Arial;
      transition: all 0.2s;
    }

    .btn:hover {
      background: #f1f3f4;
      border-color: #dadce0;
      box-shadow: 0 1px 2px rgba(0,0,0,0.1);
      transform: scale(1.02);
    }

    /* Results section */
    .results-section {
      width: 100%;
      max-width: 680px;
      margin: 30px auto 50px;
      display: none;
      animation: fadeInUp 0.4s ease;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .results-header {
      font-size: 14px;
      color: #70757a;
      margin-bottom: 24px;
      padding-bottom: 8px;
      border-bottom: 1px solid #ebebeb;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
    }

    .ai-badge {
      background: #e8f0fe;
      color: #1a73e8;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 500;
    }

    body.dark-mode .ai-badge {
      background: #3c4043;
      color: #8ab4f8;
    }

    .result-item {
      margin-bottom: 28px;
      padding: 8px;
      border-radius: 8px;
      transition: background 0.2s;
    }

    .result-item:hover {
      background: rgba(0, 0, 0, 0.02);
    }

    .result-url {
      font-size: 12px;
      color: #202124;
      margin-bottom: 4px;
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }

    .result-url span {
      color: #4d5156;
    }

    .result-title {
      font-size: 20px;
      font-weight: 400;
      line-height: 1.3;
      margin: 6px 0 4px;
    }

    .result-title a {
      color: #1a0dab;
      text-decoration: none;
    }

    .result-title a:hover {
      text-decoration: underline;
    }

    .result-snippet {
      color: #4d5156;
      font-size: 14px;
      line-height: 1.5;
    }

    /* Answer box for Tavily's AI answer */
    .answer-box {
      background: #f8f9fa;
      border-radius: 16px;
      padding: 20px 24px;
      margin-bottom: 32px;
      border-left: 4px solid #1a73e8;
    }

    body.dark-mode .answer-box {
      background: #303134;
      border-left-color: #8ab4f8;
    }

    .answer-label {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #1a73e8;
      font-weight: 500;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .answer-content {
      font-size: 16px;
      line-height: 1.5;
      color: inherit;
    }

    .loader {
      display: flex;
      justify-content: center;
      padding: 40px;
    }

    .loader-dot {
      width: 12px;
      height: 12px;
      background: #9aa0a6;
      border-radius: 50%;
      margin: 0 6px;
      animation: bounce 1.2s infinite ease-in-out;
    }

    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0); opacity: 0.5; }
      40% { transform: scale(1); opacity: 1; }
    }

    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      background: #323232;
      color: white;
      padding: 12px 24px;
      border-radius: 48px;
      font-size: 14px;
      z-index: 1000;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
    }

    .footer {
      background: #f2f2f2;
      margin-top: 40px;
      padding: 15px 30px;
      font-size: 14px;
      border-top: 1px solid #dadce0;
    }

    .footer-content {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
    }

    .footer-links {
      display: flex;
      gap: 28px;
      flex-wrap: wrap;
    }

    .footer-links a {
      color: #70757a;
      text-decoration: none;
    }

    .footer-links a:hover {
      text-decoration: underline;
    }

    @media (max-width: 600px) {
      .header { padding: 12px 16px; }
      .logo svg { width: 160px; height: auto; }
      .search-box { padding: 4px 12px; }
      .result-title { font-size: 18px; }
      .answer-box { padding: 16px; }
    }
  </style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <a href="#" class="header-link" id="aboutLink">About</a>
    <a href="#" class="header-link" id="storeLink">Store</a>
  </div>
  <a href="#" class="header-link" id="gmailLink">Gmail</a>
  <a href="#" class="header-link" id="imagesLink">Images</a>
  <button class="icon-btn" id="darkModeToggle" title="Toggle dark mode">
    <i class="fas fa-moon"></i>
  </button>
  <div class="avatar" id="avatarBtn">G</div>
</div>

<div class="main" id="mainContainer">
  <div class="logo" id="logoClick">
    <svg viewBox="0 0 272 92" xmlns="http://www.w3.org/2000/svg">
      <path fill="#EA4335" d="M115.75 47.18c0 12.82-9.42 22.18-22.25 22.18s-22.25-9.36-22.25-22.18 9.42-22.18 22.25-22.18 22.25 9.36 22.25 22.18zm-9.74 0c0-7.98-5.79-13.44-12.51-13.44s-12.51 5.46-12.51 13.44 5.79 13.44 12.51 13.44 12.51-5.46 12.51-13.44z"/>
      <path fill="#FBBC05" d="M163.75 47.18c0 12.82-9.42 22.18-22.25 22.18s-22.25-9.36-22.25-22.18 9.42-22.18 22.25-22.18 22.25 9.36 22.25 22.18zm-9.74 0c0-7.98-5.79-13.44-12.51-13.44s-12.51 5.46-12.51 13.44 5.79 13.44 12.51 13.44 12.51-5.46 12.51-13.44z"/>
      <path fill="#4285F4" d="M209.75 26.34v39.82c0 16.38-9.66 23.07-21.08 23.07-10.75 0-17.22-7.19-19.66-13.07l8.48-3.53c1.76 4.07 6.08 8.4 11.18 8.4 6.83 0 11.18-4.41 11.18-12.47v-3.98h-.2c-2.35 2.74-6.28 4.7-10.64 4.7-10.28 0-18.67-8.5-18.67-19.46 0-10.97 8.39-19.47 18.67-19.47 4.36 0 8.29 1.96 10.64 4.7h.2v-3.71h9.1zm-9.01 20.1c0-6.33-4.52-11.09-10.42-11.09s-10.42 4.76-10.42 11.09 4.52 11.09 10.42 11.09 10.42-4.76 10.42-11.09z"/>
      <path fill="#34A853" d="M258.75 47.18c0 12.82-9.42 22.18-22.25 22.18s-22.25-9.36-22.25-22.18 9.42-22.18 22.25-22.18 22.25 9.36 22.25 22.18zm-9.74 0c0-7.98-5.79-13.44-12.51-13.44s-12.51 5.46-12.51 13.44 5.79 13.44 12.51 13.44 12.51-5.46 12.51-13.44z"/>
      <path fill="#EA4335" d="M35.75 47.18c0 12.82-9.42 22.18-22.25 22.18s-22.25-9.36-22.25-22.18 9.42-22.18 22.25-22.18 22.25 9.36 22.25 22.18zm-9.74 0c0-7.98-5.79-13.44-12.51-13.44s-12.51 5.46-12.51 13.44 5.79 13.44 12.51 13.44 12.51-5.46 12.51-13.44z"/>
    </svg>
  </div>

  <div class="search-container">
    <div class="search-box">
      <i class="fas fa-search search-icon"></i>
      <input type="text" id="searchInput" placeholder="Ask Tavily AI or search the web..." autocomplete="off">
      <div class="search-actions">
        <i class="fas fa-microphone action-icon" id="voiceBtn"></i>
        <i class="fas fa-times-circle action-icon" id="clearBtn" style="display: none;"></i>
      </div>
      <div class="suggestions-dropdown" id="suggestionsDropdown"></div>
    </div>
    <div class="buttons">
      <button class="btn" id="googleSearchBtn"><i class="fas fa-robot"></i> Tavily AI Search</button>
      <button class="btn" id="luckyBtn"><i class="fas fa-dice-d6"></i> I'm Feeling Lucky</button>
    </div>
  </div>

  <div class="results-section" id="resultsSection">
    <div class="results-header" id="resultsHeader">
      <span></span>
      <span class="ai-badge"><i class="fas fa-brain"></i> Powered by Tavily AI</span>
    </div>
    <div id="answerBox" class="answer-box" style="display: none;"></div>
    <div id="resultsList"></div>
  </div>
</div>

<div class="footer">
  <div class="footer-content">
    <div class="footer-links">
      <a href="#">Advertising</a>
      <a href="#">Business</a>
      <a href="#">How Search works</a>
    </div>
    <div class="footer-links">
      <a href="#">Privacy</a>
      <a href="#">Terms</a>
      <a href="#">Settings</a>
    </div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script>
  // ===================== TAVILY API INTEGRATION =====================
  // Tavily API endpoint (v1 search)
  // Free tier available at https://tavily.com
  const TAVILY_API_URL = 'https://api.tavily.com/search';
  
  // IMPORTANT: For demo purposes, we'll use a public demo key or allow user to enter?
  // Tavily requires API key. To make this work out-of-box, we'll use a proxy or show setup.
  // Since API keys can't be hardcoded publicly, we'll implement a key input modal for first use.
  // But for seamless demo, we'll store key in localStorage or prompt.
  // Users can get free key from tavily.com. We'll create a settings UI.
  
  let TAVILY_API_KEY = localStorage.getItem('tavily_api_key') || '';
  
  // Function to prompt for API key if not set
  function checkAndPromptApiKey() {
    if (!TAVILY_API_KEY) {
      const key = prompt("🔑 Tavily API Key Required\n\nGet your free API key from https://tavily.com\n(Free tier: 1000 requests/month)\n\nEnter your API key to enable AI search:", "");
      if (key && key.trim()) {
        TAVILY_API_KEY = key.trim();
        localStorage.setItem('tavily_api_key', TAVILY_API_KEY);
        showToast("✅ API Key saved! You can now search with Tavily AI.", 3000);
        return true;
      } else {
        showToast("⚠️ API key required for Tavily search. Using fallback mode.", 4000);
        return false;
      }
    }
    return true;
  }
  
  // DOM elements
  const searchInput = document.getElementById('searchInput');
  const clearBtn = document.getElementById('clearBtn');
  const voiceBtn = document.getElementById('voiceBtn');
  const googleSearchBtn = document.getElementById('googleSearchBtn');
  const luckyBtn = document.getElementById('luckyBtn');
  const resultsSection = document.getElementById('resultsSection');
  const resultsHeader = document.getElementById('resultsHeader');
  const resultsList = document.getElementById('resultsList');
  const answerBox = document.getElementById('answerBox');
  const mainContainer = document.getElementById('mainContainer');
  const darkModeToggle = document.getElementById('darkModeToggle');
  const suggestionsDropdown = document.getElementById('suggestionsDropdown');
  const logoClick = document.getElementById('logoClick');

  let currentQuery = '';
  let suggestionsCache = new Map();

  function showToast(message, duration = 2500) {
    const toast = document.getElementById('toast');
    toast.textContent = message;
    toast.style.opacity = '1';
    setTimeout(() => {
      toast.style.opacity = '0';
    }, duration);
  }

  // Dark mode
  darkModeToggle.addEventListener('click', () => {
    document.body.classList.toggle('dark-mode');
    const icon = darkModeToggle.querySelector('i');
    if (document.body.classList.contains('dark-mode')) {
      icon.classList.remove('fa-moon');
      icon.classList.add('fa-sun');
      showToast('Dark mode activated 🌙');
    } else {
      icon.classList.remove('fa-sun');
      icon.classList.add('fa-moon');
      showToast('Light mode activated ☀️');
    }
  });

  function toggleClearButton() {
    clearBtn.style.display = searchInput.value.length > 0 ? 'inline-block' : 'none';
  }
  
  searchInput.addEventListener('input', () => {
    toggleClearButton();
    fetchSuggestions(searchInput.value);
  });
  
  clearBtn.addEventListener('click', () => {
    searchInput.value = '';
    toggleClearButton();
    searchInput.focus();
    suggestionsDropdown.style.display = 'none';
    if (resultsSection.style.display === 'block') {
      resultsSection.style.display = 'none';
      mainContainer.classList.remove('compact');
    }
  });

  // Smart suggestions using Tavily (or fallback)
  async function fetchSuggestions(query) {
    if (!query.trim()) {
      suggestionsDropdown.style.display = 'none';
      return;
    }
    if (suggestionsCache.has(query)) {
      renderSuggestions(suggestionsCache.get(query));
      return;
    }
    const fallbackSuggestions = [`${query} latest news`, `${query} wikipedia`, `${query} meaning`, `${query} trends`, `${query} guide`];
    renderSuggestions(fallbackSuggestions);
    suggestionsCache.set(query, fallbackSuggestions);
  }

  function renderSuggestions(suggestions) {
    if (!suggestions.length) {
      suggestionsDropdown.style.display = 'none';
      return;
    }
    suggestionsDropdown.innerHTML = suggestions.slice(0, 6).map(s => `
      <div class="suggestion-item">
        <i class="fas fa-search"></i>
        <span>${escapeHtml(s.substring(0, 80))}</span>
      </div>
    `).join('');
    suggestionsDropdown.style.display = 'block';
    document.querySelectorAll('.suggestion-item').forEach((item) => {
      item.addEventListener('click', () => {
        const text = item.querySelector('span').textContent;
        searchInput.value = text;
        suggestionsDropdown.style.display = 'none';
        performSearch(text);
      });
    });
  }

  document.addEventListener('click', (e) => {
    if (!e.target.closest('.search-box')) {
      suggestionsDropdown.style.display = 'none';
    }
  });

  // Voice search
  function startVoiceSearch() {
    if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
      showToast("Voice search not supported. Try Chrome!", 3000);
      return;
    }
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    const recognition = new SpeechRecognition();
    recognition.lang = 'en-US';
    recognition.interimResults = true;
    recognition.start();
    voiceBtn.style.color = '#1a73e8';
    voiceBtn.classList.add('fa-beat-fade');
    recognition.onresult = (event) => {
      const interim = Array.from(event.results).map(res => res[0].transcript).join('');
      searchInput.value = interim;
      toggleClearButton();
      if (event.results[0].isFinal) {
        performSearch(interim);
      }
    };
    recognition.onerror = () => {
      voiceBtn.style.color = '#5f6368';
      voiceBtn.classList.remove('fa-beat-fade');
      showToast("Voice recognition failed.", 2000);
    };
    recognition.onend = () => {
      voiceBtn.style.color = '#5f6368';
      voiceBtn.classList.remove('fa-beat-fade');
    };
  }
  voiceBtn.addEventListener('click', startVoiceSearch);

  // ===================== TAVILY SEARCH =====================
  async function performSearch(query) {
    if (!query.trim()) {
      showToast("Please enter a search term", 1500);
      return;
    }
    currentQuery = query;
    resultsSection.style.display = 'block';
    mainContainer.classList.add('compact');
    resultsList.innerHTML = `<div class="loader"><div class="loader-dot"></div><div class="loader-dot"></div><div class="loader-dot"></div></div>`;
    answerBox.style.display = 'none';
    resultsHeader.querySelector('span').innerHTML = `Searching Tavily AI for "${escapeHtml(query)}"...`;
    
    // Check API key
    const hasKey = checkAndPromptApiKey();
    
    if (!hasKey || !TAVILY_API_KEY) {
      // Fallback mode
      showToast("Using fallback search (no API key). Get free key at tavily.com", 4000);
      showFallbackResults(query);
      return;
    }
    
    try {
      const response = await fetch(TAVILY_API_URL, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${TAVILY_API_KEY}`
        },
        body: JSON.stringify({
          query: query,
          search_depth: "basic",
          include_answer: true,
          include_raw_content: false,
          max_results: 12
        })
      });
      
      if (!response.ok) {
        const errorData = await response.json();
        if (response.status === 401 || response.status === 403) {
          showToast("Invalid API key. Please re-enter your Tavily API key.", 4000);
          localStorage.removeItem('tavily_api_key');
          TAVILY_API_KEY = '';
          checkAndPromptApiKey();
          showFallbackResults(query);
          return;
        }
        throw new Error(`API error: ${response.status}`);
      }
      
      const data = await response.json();
      displayTavilyResults(data, query);
      
    } catch (error) {
      console.error('Tavily API error:', error);
      showToast("Tavily API error. Using fallback results.", 3000);
      showFallbackResults(query);
    }
  }
  
  function displayTavilyResults(data, query) {
    const results = data.results || [];
    const answer = data.answer || '';
    
    // Show AI answer if available
    if (answer && answer.trim()) {
      answerBox.style.display = 'block';
      answerBox.innerHTML = `
        <div class="answer-label">
          <i class="fas fa-robot"></i> Tavily AI Answer
        </div>
        <div class="answer-content">${escapeHtml(answer)}</div>
      `;
    } else {
      answerBox.style.display = 'none';
    }
    
    const totalResults = data.response_time ? Math.max(results.length, 5) + Math.floor(Math.random() * 20) : results.length;
    const timeElapsed = data.response_time ? data.response_time.toFixed(2) : (Math.random() * 0.3 + 0.35).toFixed(2);
    resultsHeader.querySelector('span').innerHTML = `About ${totalResults} results (${timeElapsed} seconds) from Tavily for "${escapeHtml(query)}"`;
    
    if (!results.length) {
      resultsList.innerHTML = `<div class="no-results" style="text-align:center; padding:40px;"><i class="fas fa-search"></i> No results found. Try a different query.</div>`;
      return;
    }
    
    let html = '';
    for (let res of results) {
      let displayUrl = res.url.length > 75 ? res.url.substring(0, 75) + '...' : res.url;
      html += `
        <div class="result-item">
          <div class="result-url">
            <i class="fas fa-link" style="font-size: 12px;"></i>
            <span>${escapeHtml(displayUrl)}</span>
          </div>
          <div class="result-title">
            <a href="${res.url}" target="_blank" rel="noopener noreferrer">${escapeHtml(res.title || res.url)}</a>
          </div>
          <div class="result-snippet">${escapeHtml(res.content || res.snippet || 'No description available')}</div>
        </div>
      `;
    }
    resultsList.innerHTML = html;
  }
  
  function showFallbackResults(query) {
    const fallbackResults = [
      { title: `Google Search for "${query}"`, url: `https://www.google.com/search?q=${encodeURIComponent(query)}`, snippet: `View full Google search results for "${query}".` },
      { title: `${query} on Wikipedia`, url: `https://en.wikipedia.org/wiki/${encodeURIComponent(query.replace(/ /g, '_'))}`, snippet: `Read Wikipedia article about ${query}.` },
      { title: `${query} News`, url: `https://news.google.com/search?q=${encodeURIComponent(query)}`, snippet: `Latest news and updates about ${query}.` },
      { title: `Bing Search: ${query}`, url: `https://www.bing.com/search?q=${encodeURIComponent(query)}`, snippet: `Search ${query} on Microsoft Bing.` }
    ];
    answerBox.style.display = 'none';
    resultsHeader.querySelector('span').innerHTML = `About ${fallbackResults.length + 5} results (0.48 seconds) for "${escapeHtml(query)}" (fallback mode)`;
    let html = '';
    for (let res of fallbackResults) {
      html += `
        <div class="result-item">
          <div class="result-url"><i class="fas fa-link"></i> <span>${escapeHtml(res.url.substring(0, 70))}</span></div>
          <div class="result-title"><a href="${res.url}" target="_blank">${escapeHtml(res.title)}</a></div>
          <div class="result-snippet">${escapeHtml(res.snippet)}</div>
        </div>
      `;
    }
    resultsList.innerHTML = html;
  }
  
  // I'm Feeling Lucky using Tavily first result
  async function handleLucky() {
    const query = searchInput.value.trim();
    if (!query) {
      showToast("Enter a search term first!", 1500);
      return;
    }
    showToast("Finding the best result... 🍀", 1500);
    
    if (!TAVILY_API_KEY) {
      window.open(`https://www.google.com/search?q=${encodeURIComponent(query)}&btnI=1`, '_blank');
      return;
    }
    
    try {
      const response = await fetch(TAVILY_API_URL, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${TAVILY_API_KEY}`
        },
        body: JSON.stringify({ query: query, search_depth: "basic", max_results: 1 })
      });
      const data = await response.json();
      if (data.results && data.results.length > 0 && data.results[0].url) {
        window.open(data.results[0].url, '_blank');
      } else {
        window.open(`https://www.google.com/search?q=${encodeURIComponent(query)}&btnI=1`, '_blank');
      }
    } catch {
      window.open(`https://www.google.com/search?q=${encodeURIComponent(query)}&btnI=1`, '_blank');
    }
  }
  
  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    });
  }
  
  googleSearchBtn.addEventListener('click', () => performSearch(searchInput.value.trim()));
  luckyBtn.addEventListener('click', handleLucky);
  searchInput.addEventListener('keypress', (e) => {
    if (e.key === 'Enter') performSearch(searchInput.value.trim());
  });
  
  logoClick.addEventListener('click', () => {
    searchInput.value = '';
    resultsSection.style.display = 'none';
    mainContainer.classList.remove('compact');
    toggleClearButton();
    searchInput.focus();
    suggestionsDropdown.style.display = 'none';
    showToast("Back to Google home", 1000);
  });
  
  document.querySelectorAll('#aboutLink, #storeLink, #gmailLink, #imagesLink').forEach(link => {
    link.addEventListener('click', (e) => {
      e.preventDefault();
      showToast(`${link.textContent} - Demo`, 1500);
    });
  });
  document.getElementById('avatarBtn').addEventListener('click', () => {
    showToast("Account menu - demo", 1200);
  });
  
  toggleClearButton();
  resultsSection.style.display = 'none';
</script>
</body>
